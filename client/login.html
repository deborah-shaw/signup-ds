<!DOCTYPE html>
<html>

<head>
  <title> Log In Page </title>
  <link href="css/style.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="centered-container">

    <h1>Log In</h1>

    <form id="loginForm">

      <p>Username: <input type="text" id="username" required></p>

      <p>Password: <input type="password" id="password" required><span class="togglePassword" data-target="password">👁</span></p>

      <p id="loginError"></p>

      <input class="button" type="submit" value="Log In">

      <p>Don’t have an account?<a href="index.html">Sign up here</a></p>

    </form>

  </div>

  <script src="js/login.js"></script>

</body>

</html>
