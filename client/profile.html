<!DOCTYPE html>
<html>

<head>
  <title> Profile </title>
  <link href="css/style.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="centered-container">

    <h1>Welcome, <span id="name"></span>!</h1>

    <h2>Account Info</h2>

    <p><b>Username: </b><span id="username"></span></p>
    <p><b>Email: </b><span id="email"></span></p>

    <h2>Personal Info</h2>

    <p><b>First Name: </b><span id="fName"></span></p>
    <p><b>Last Name: </b><span id="lName"></span></p>
    <p><b>Gender: </b><span id="gender"></span></p>

    <h2>Location</h2>

    <p><b>City: </b><span id="city"></span></p>
    <p><b>State: </b><span id="state"></span></p>
    <p><b>Zip: </b><span id="zip"></span></p>
    <p><b>Latitude: </b><span id="latitude"></span></p>
    <p><b>Longitude: </b><span id="longitude"></span></p>

    <button class="button" id="logout">Logout</button>

  </div>

  <script src="js/profile.js"></script>

</body>

</html>
